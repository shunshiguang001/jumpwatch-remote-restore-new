server:
  port: 8088

management:
  endpoints:
    web:
      exposure:
        include: "*"        # 暴露所有 Web 端点，含 configprops、env 等
  endpoint:
    health:
      show-details: always  # 便于调试
    configprops:
      enabled: true         # 显式开启（有时默认即开）

monitor:
 user: appoper
# hosts:
#   "[20.224.105.90]":  # 使用中括号+双引号，这是 Spring Boot 映射 Map Key 的强力写法
#     allowed-units:
#       - uchain-bill-manager
#     allowed-logs:
#       uchain-bill-manager: /app/appoper/sit/bill/logs/app.log
#   "[20.224.105.91]":
#     allowed-units:
#       - uchain-branch-manager

#jumpwatch:
 #ssh-user: appoper
 #cmd-timeout-sec: 15
 #systemd-enabled: true
 #journald-enabled: false
 #command-paths:
 #  systemctl:  /usr/bin/systemctl
 #  journalctl: /usr/bin/journalctl
 #  pgrep:      /usr/bin/pgrep
  # tail:       /usr/bin/tail
 hosts:
   "[20.224.105.90]":  # 使用中括号+双引号，用来 Spring Boot 映射 Map Key
     ip: 20.224.105.90
     allowed-units:
       - uchain-assetPool-service
       - uchain-bill-manager
       - uchain-loan-manager
       - uchain-ticket
     allowed-logs:
       uchain-assetPool-service:  /app/appoper/sit/assetPool/logs/app.log
       uchain-bill-manager:  /app/appoper/sit/bill/logs/app.log
       uchain-loan-manager:  /app/appoper/sit/loan/logs/app.log
       uchain-ticket:        /app/appoper/sit/ticket/logs/app.log
       # 修正缩进：确保 jarPath 和 jarName 与 allowed-logs 对齐
       jarPath: /app/appoper/sit/assetPool/
       jarName: uchain-assetPool-service
       jarPath: /app/appoper/sit/bill/
       jarName: uchain-bill-manager
   "[20.224.105.91]":  # 使用中括号+双引号，用来 Spring Boot 映射 Map Key
